    <style>

  <body>
    <div id="root"></div>
    <script type="text/babel">
      // ─── DATA LOADING ────────────────────────────────────────────────────────────
      /**
       * Asynchronously loads family tree data from an external JSON file.
       * Expects the JSON to contain a `rootId` and a `family` object mapping.
       */
      async function loadFamilyData() {
        const response = await fetch("family-data.json");
        if (!response.ok) {
          throw new Error(`Unable to load family-data.json (${response.status})`);
        }
        const data = await response.json();
        if (!data?.rootId || !data?.family) {
          throw new Error("family-data.json must include rootId and family");
        }
        return data;
      }

      // ─── GEOMETRY ─────────────────────────────────────────────────────────────────
      const SIZE = 1000,
        CX = SIZE / 2,
        CY = SIZE / 2,
        CENTER_R = 80,
        MAX_GEN = 6;
      const RW = 58; // ring width: 80 + 6 * 58 = 428, leaving a 72px safety margin
      const FAN_SWEEP = Math.PI;
      const ROOT_BRANCH_GAP = (8 * Math.PI) / 180;
      const MAX_WEDGE = (2 * Math.PI) / 5; // no single wedge may exceed 1/5 of the full circle

      function polar(cx, cy, r, a) {
        return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
      }

      function wedgePath(cx, cy, r0, r1, a0, a1) {
        const p0 = polar(cx, cy, r0, a0),
          p1 = polar(cx, cy, r1, a0),
          p2 = polar(cx, cy, r1, a1),
          p3 = polar(cx, cy, r0, a1);
        const la = a1 - a0 > Math.PI ? 1 : 0;
        return `M${p0.x} ${p0.y} L${p1.x} ${p1.y} A${r1} ${r1} 0 ${la} 1 ${p2.x} ${p2.y} L${p3.x} ${p3.y} A${r0} ${r0} 0 ${la} 0 ${p0.x} ${p0.y} Z`;
      }

      function genColor(gen) {
        return [
          "hsl(284,84%,66%)",
          "hsl(248,84%,68%)",
          "hsl(214,90%,64%)",
          "hsl(188,82%,56%)",
          "hsl(164,72%,50%)",
          "hsl(118,62%,55%)",
          "hsl(58,88%,62%)",
          "hsl(34,92%,61%)",
          "hsl(14,88%,62%)",
          "hsl(342,82%,65%)",
          "hsl(312,78%,66%)",
        ][Math.min(gen, 10)];
      }

      function getSiblings(pid, family) {
        const p = family[pid];
        if (!p || (!p.motherId && !p.fatherId)) return [];
        return Object.values(family)
          .filter(
            (q) =>
              q.id !== pid &&
              ((p.motherId && q.motherId === p.motherId) ||
                (p.fatherId && q.fatherId === p.fatherId)),
          )
          .sort(
            (a, b) => (parseInt(a.birth) || 9999) - (parseInt(b.birth) || 9999),
          );
      }

      function getChildren(pid, family) {
        return Object.values(family)
          .filter((p) => p.fatherId === pid || p.motherId === pid)
          .sort(
            (a, b) => (parseInt(a.birth) || 9999) - (parseInt(b.birth) || 9999),
          );
      }

      function getSpouses(pid, family) {
        const p = family[pid];
        if (!p) return [];
        const ids = new Set();
        if (p.spouseId) ids.add(p.spouseId);
        (p.spouseIds || []).forEach((id) => ids.add(id));
        Object.values(family).forEach((q) => {
          if (q.spouseId === pid) ids.add(q.id);
          if ((q.spouseIds || []).includes(pid)) ids.add(q.id);
        });
        return [...ids]
          .map((id) => family[id])
          .filter(Boolean)
          .sort(
            (a, b) => (parseInt(a.birth) || 9999) - (parseInt(b.birth) || 9999),
          );
      }

      function getSpouse(pid, family) {
        return getSpouses(pid, family)[0] || null;
      }

      function fanGeometry() {
        const fullCircle = false;
        const sweep = FAN_SWEEP;
        const startAngle = (3 * Math.PI) / 2 - sweep / 2;
        return { fullCircle, sweep, startAngle };
      }

      function insetAngles(a0, a1) {
        const childGap = Math.min(
          (6 * Math.PI) / 180,
          ((a1 - a0) * 0.18) / 2,
        );
        return { ca0: a0 + childGap, ca1: a1 - childGap };
      }

      // ─── WHEEL BUILDER ────────────────────────────────────────────────────────────
      /**
       * Constructs the wedges for the Ancestor Wheel.
       * Calculates the geometry (inner/outer radius, start/end angle) for each ancestor,
       * proportionally sizing wedges based on the number of known leaf ancestors they have.
       * 
       * @param {string} centerId - The ID of the person at the center of the wheel.
       * @param {Object} family - The family dataset mapping IDs to person objects.
       * @param {Set<string>} expanded - Set of person IDs whose ancestry is expanded.
       * @param {string|null} sibAnchorPid - ID of the sibling group anchor.
       * @param {string|null} dominantSibId - ID of the selected sibling to emphasize.
       * @returns {Object} An object containing the generated `wedges` array and `fullCircle` boolean.
       */
      // sibAnchorPid: whose siblings to show (independent of card selection)
      function buildWheel(
        centerId,
        family,
        expanded,
        sibAnchorPid,
        dominantSibId,
      ) {
        const wedges = [];
        const showSibs = sibAnchorPid ? new Set([sibAnchorPid]) : new Set();

        function ownLeaves(pid, gen) {
          if (gen > MAX_GEN || !pid) return 1;
          const p = family[pid];
          if (!p) return 1;
          if (gen >= 2 && !expanded.has(pid)) return 1;
          return (
            ownLeaves(p.motherId, gen + 1) + ownLeaves(p.fatherId, gen + 1)
          );
        }

        function allocSlots(pid, gen) {
          const own = ownLeaves(pid, gen);
          if (!pid || !showSibs.has(pid)) return own;
          return own + getSiblings(pid, family).length;
        }

        const cp = family[centerId] || {};
        const ms0 = allocSlots(cp.motherId, 1);
        const fs0 = allocSlots(cp.fatherId, 1);
        const totalRoot = ms0 + fs0;

        // Fan is a 180 degree arc centered on the 12 o'clock line.
        // CY never changes — the container clips/reveals the bottom arc.
        const { fullCircle, sweep, startAngle } = fanGeometry();

        function build(pid, gen, a0, a1) {
          if (gen < 1 || gen > MAX_GEN) return;
          const p = pid ? family[pid] : null;
          const r0 = CENTER_R + (gen - 1) * RW,
            r1 = CENTER_R + gen * RW;

          let group;
          if (pid && showSibs.has(pid)) {
            const sibs = getSiblings(pid, family);
            const all = [...sibs, p].sort(
              (a, b) =>
                (parseInt(a?.birth) || 9999) - (parseInt(b?.birth) || 9999),
            );
            group = all.map((m) => ({
              pid: m.id,
              isSelf: m.id === pid,
              leaves: m.id === pid ? ownLeaves(pid, gen) : 1,
            }));
          } else {
            group = [{ pid, isSelf: true, leaves: ownLeaves(pid, gen) }];
          }

          // Guarantee the dominant sibling has strictly more leaves than any other member
          if (dominantSibId) {
            const maxOther = group
              .filter((g) => g.pid !== dominantSibId)
              .reduce((m, g) => Math.max(m, g.leaves), 0);
            group = group.map((g) =>
              g.pid === dominantSibId
                ? { ...g, leaves: Math.max(g.leaves, maxOther + 1) }
                : g,
            );
          }

          // Scale all widths so the largest wedge = MAX_WEDGE; leftover arc stays empty
          const totalAngle = a1 - a0;
          const sumL = group.reduce((s, g) => s + g.leaves, 0);
          let widths = group.map((g) => (totalAngle * g.leaves) / sumL);
          const maxW = Math.max(...widths);
          if (group.length > 1 && maxW > MAX_WEDGE) {
            const scale = MAX_WEDGE / maxW;
            widths = widths.map((w) => w * scale);
          }

          let cursor = a0;
          let gi = 0;

          for (const g of group) {
            const gw = widths[gi++];
            const ga0 = cursor,
              ga1 = cursor + gw;
            cursor = ga1;
            const gp = g.pid ? family[g.pid] : null;
            const mid = (ga0 + ga1) / 2;
            const lp = polar(CX, CY, (r0 + r1) / 2, mid);

            wedges.push({
              person: gp,
              generation: gen,
              startAngle: ga0,
              endAngle: ga1,
              innerRadius: r0,
              outerRadius: r1,
              path: wedgePath(CX, CY, r0, r1, ga0, ga1),
              labelPos: { x: lp.x, y: lp.y },
              key: g.pid || `empty-${gen}-${ga0.toFixed(2)}`,
              isSibling: !g.isSelf,
            });

            if (g.isSelf) {
              const shouldExpand = gen < 2 || (p && expanded.has(pid));
              if (shouldExpand) {
                const ms = allocSlots(p?.motherId, gen + 1);
                const fs = allocSlots(p?.fatherId, gen + 1);
                const tot = ms + fs;
                if (tot > 0) {
                  const { ca0, ca1 } = insetAngles(ga0, ga1);
                  const mw = ((ca1 - ca0) * ms) / tot;
                  build(p?.motherId, gen + 1, ca0, ca0 + mw);
                  build(p?.fatherId, gen + 1, ca0 + mw, ca1);
                }
              }
            }
          }
        }

        const rootHasSiblingFan =
          showSibs.has(cp.motherId) || showSibs.has(cp.fatherId);
        const rootGap = ms0 > 0 && fs0 > 0 && rootHasSiblingFan ? ROOT_BRANCH_GAP : 0;
        const usableSweep = sweep - rootGap;
        const mw = (usableSweep * ms0) / totalRoot;
        build(cp.motherId, 1, startAngle, startAngle + mw);
        build(cp.fatherId, 1, startAngle + mw + rootGap, startAngle + sweep);

        return { wedges, fullCircle };
      }

      /**
       * Constructs the wedges for the Descendant Wheel.
       * Iterates through children and further descendants, calculating fan wedges
       * starting from the center outward.
       * 
       * @param {string} centerId - The ID of the person at the center of the wheel.
       * @param {Object} family - The family dataset mapping IDs to person objects.
       * @param {Set<string>} expanded - Set of person IDs whose descendants are expanded.
       * @returns {Object} An object containing the generated `wedges` array and `fullCircle` boolean.
       */
      function buildDescendantWheel(centerId, family, expanded) {
        const wedges = [];

        function ownLeaves(pid, gen) {
          if (gen > MAX_GEN || !pid) return 1;
          const children = getChildren(pid, family);
          if (children.length === 0) return 1;
          if (gen >= 2 && !expanded.has(pid)) return 1;
          return children.reduce(
            (sum, child) => sum + ownLeaves(child.id, gen + 1),
            0,
          );
        }

        function build(pid, gen, a0, a1) {
          if (gen < 1 || gen > MAX_GEN || !pid) return;
          const children = getChildren(pid, family);
          if (children.length === 0) return;

          const r0 = CENTER_R + (gen - 1) * RW,
            r1 = CENTER_R + gen * RW;
          const totalLeaves = children.reduce(
            (sum, child) => sum + ownLeaves(child.id, gen),
            0,
          );
          let cursor = a0;

          for (const child of children) {
            const leaves = ownLeaves(child.id, gen);
            const gw = ((a1 - a0) * leaves) / totalLeaves;
            const ga0 = cursor,
              ga1 = cursor + gw;
            cursor = ga1;
            const mid = (ga0 + ga1) / 2;
            const lp = polar(CX, CY, (r0 + r1) / 2, mid);

            wedges.push({
              person: child,
              generation: gen,
              startAngle: ga0,
              endAngle: ga1,
              innerRadius: r0,
              outerRadius: r1,
              path: wedgePath(CX, CY, r0, r1, ga0, ga1),
              labelPos: { x: lp.x, y: lp.y },
              key: child.id,
              isSibling: false,
            });

            if (gen < 2 || expanded.has(child.id)) {
              const { ca0, ca1 } = insetAngles(ga0, ga1);
              build(child.id, gen + 1, ca0, ca1);
            }
          }
        }

        const children = getChildren(centerId, family);
        const { fullCircle, sweep, startAngle } = fanGeometry();

        if (children.length > 0) {
          build(centerId, 1, startAngle, startAngle + sweep);
        }

        return { wedges, fullCircle };
      }

      // ─── ICONS ────────────────────────────────────────────────────────────────────
      const Ic = ({ d, size = 16 }) => (
        <svg
          viewBox="0 0 24 24"
          width={size}
          height={size}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d={d} />
        </svg>
      );
      const IcTree = () => (
        <Ic
          size={20}
          d="M12 22V12M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7zM5 22h14"
        />
      );
      const IcReset = () => (
        <svg
          viewBox="0 0 24 24"
          width={14}
          height={14}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      );
      const IcX = () => <Ic d="M18 6 6 18M6 6l12 12" />;
      const IcTarget = () => (
        <svg
          viewBox="0 0 24 24"
          width={16}
          height={16}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="22" y1="12" x2="18" y2="12" />
          <line x1="6" y1="12" x2="2" y2="12" />
          <line x1="12" y1="6" x2="12" y2="2" />
          <line x1="12" y1="22" x2="12" y2="18" />
        </svg>
      );
      const IcInfo = () => (
        <svg
          viewBox="0 0 24 24"
          width={16}
          height={16}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
      );
      const IcUser = () => (
        <svg
          viewBox="0 0 24 24"
          width={24}
          height={24}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      );
      const IcPlus = () => <Ic d="M12 5v14M5 12h14" />;
      const IcChevs = () => (
        <svg
          viewBox="0 0 24 24"
          width={14}
          height={14}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="m7 15 5 5 5-5" />
          <path d="m7 9 5-5 5 5" />
        </svg>
      );
      const IcSibling = () => (
        <svg
          viewBox="0 0 24 24"
          width={14}
          height={14}
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="9" cy="7" r="3" />
          <circle cx="15" cy="7" r="3" />
          <path d="M3 21v-2a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v2" />
        </svg>
      );

      // ─── LINEAGE WHEEL ────────────────────────────────────────────────────────────
      /**
       * The main React component that renders the interactive SVG fan chart.
       * Supports switching between Ancestor and Descendant views, smooth animations
       * for zooming/rotating, and interactivity (hover, click, double-click) for wedges.
       */
      function LineageWheel({
        centerId,
        family,
        expanded,
        selectedPid,
        sibAnchorPid,
        viewDirection,
        canGoBack,
        onWedgeClick,
        onWedgeDoubleClick,
        onCenterClick,
        onHistoryBack,
        onSpouseClick,
      }) {
        const [hoverKey, setHoverKey] = React.useState(null);
        const center = family[centerId];
        const spouses = getSpouses(centerId, family);
        const outerRef = React.useRef(null);
        const isAncestorView = viewDirection === "ancestors";

        // When a sibling is individually selected it becomes dominant; otherwise no dominant
        const dominantSibId =
          isAncestorView && selectedPid && sibAnchorPid && selectedPid !== sibAnchorPid
            ? selectedPid
            : null;

        // Build wheel — dominant sibling gets extra leaf slots so its wedge is wider
        const { wedges, fullCircle } = React.useMemo(
          () => {
            if (isAncestorView) {
              return buildWheel(
                centerId,
                family,
                expanded,
                sibAnchorPid,
                dominantSibId,
              );
            }
            return buildDescendantWheel(centerId, family, expanded);
          },
          [
            centerId,
            family,
            expanded,
            sibAnchorPid,
            dominantSibId,
            isAncestorView,
          ],
        );

        // Animate container height: CY is always SIZE/2, container reveals bottom arc
        // Half: show y=0..CY+CENTER_R+20  Full: show full square
        React.useEffect(() => {
          const el = outerRef.current;
          if (!el) return;
          function resize() {
            const w = el.offsetWidth;
            const lowerReveal = spouses.length > 0 ? CENTER_R + 120 : CENTER_R + 20;
            const halfH = Math.round((w * (CY + lowerReveal)) / SIZE);
            el.style.height = (fullCircle ? w : halfH) + "px";
          }
          resize();
          const ro = new ResizeObserver(resize);
          ro.observe(el);
          return () => ro.disconnect();
        }, [fullCircle, spouses.length]);

        // Rotation: spin the dominant sibling (if selected) or the anchor to 12 o'clock
        const rotationTargetKey = isAncestorView ? dominantSibId || sibAnchorPid : selectedPid;
        const anchorWedge = rotationTargetKey
          ? wedges.find((w) => w.key === rotationTargetKey)
          : null;
        const wheelRotDeg = React.useMemo(() => {
          if (!anchorWedge) return 0;
          const mid = (anchorWedge.startAngle + anchorWedge.endAngle) / 2;
          return 270 - (mid * 180) / Math.PI;
        }, [anchorWedge]);
        const wheelRotRad = (wheelRotDeg * Math.PI) / 180;
        const occupiedSpouseAngles = React.useMemo(
          () =>
            wedges
              .filter((w) => w.person && w.generation <= 3)
              .map((w) => {
                const start = w.startAngle + wheelRotRad;
                const end = w.endAngle + wheelRotRad;
                return {
                  mid: (start + end) / 2,
                  half: Math.abs(end - start) / 2 + 0.18,
                };
              }),
          [wedges, wheelRotRad],
        );
        const renderedWedges = React.useMemo(
          () =>
            [...wedges].sort((a, b) => {
              const ap = (selectedPid === a.key ? 1 : 0) + (hoverKey === a.key ? 2 : 0);
              const bp = (selectedPid === b.key ? 1 : 0) + (hoverKey === b.key ? 2 : 0);
              return ap - bp;
            }),
          [wedges, selectedPid, hoverKey],
        );

        const initials =
          center?.name
            .split(" ")
            .map((p) => p[0])
            .slice(0, 2)
            .join("") ?? "?";
        function labelRotation(w, wheelRot) {
          const mid = (w.startAngle + w.endAngle) / 2;
          const midDeg = (mid * 180) / Math.PI + wheelRot;
          let deg = midDeg + 90;
          const n = ((deg % 360) + 360) % 360;
          if (n > 90 && n < 270) deg -= 180;
          return deg - wheelRot;
        }

        function angleDistance(a, b) {
          return Math.abs(Math.atan2(Math.sin(a - b), Math.cos(a - b)));
        }

        function spouseAngleIsOpen(angle) {
          return !occupiedSpouseAngles.some(
            (range) => angleDistance(angle, range.mid) <= range.half,
          );
        }

        function openSpouseAngle(preferredAngle) {
          if (spouseAngleIsOpen(preferredAngle)) return preferredAngle;
          const step = 0.035;
          for (let delta = step; delta <= Math.PI; delta += step) {
            const below = preferredAngle - delta;
            if (spouseAngleIsOpen(below)) return below;
            const above = preferredAngle + delta;
            if (spouseAngleIsOpen(above)) return above;
          }
          return preferredAngle;
        }

        return (
          <div
            ref={outerRef}
            style={{
              position: "relative",
              width: "100%",
              maxWidth: 1000,
              margin: "0 auto",
              overflow: "hidden",
              transition: "height 0.75s cubic-bezier(0.34,1.1,0.64,1)",
            }}
          >
            <div
              style={{
                position: "absolute",
                inset: 0,
                pointerEvents: "none",
                background:
                  "radial-gradient(circle,hsl(280 90% 65%/0.35) 0%,transparent 70%)",
                filter: "blur(40px)",
              }}
            />
            <svg
              viewBox={`0 0 ${SIZE} ${SIZE}`}
              style={{ width: "100%", display: "block", overflow: "visible" }}
            >
              <defs>
                <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="hsl(280,85%,65%)" />
                  <stop offset="100%" stopColor="hsl(200,95%,60%)" />
                </linearGradient>
              </defs>

              {/* Guide rings */}
              {Array.from({ length: MAX_GEN + 1 }).map((_, i) => (
                <circle
                  key={i}
                  cx={CX}
                  cy={CY}
                  r={CENTER_R + i * RW}
                  fill="none"
                  stroke="hsl(230,25%,20%)"
                  strokeWidth={0.5}
                  strokeDasharray="2 6"
                  opacity={0.3}
                />
              ))}

              {/* Wedges */}
              <g
                style={{
                  transformOrigin: `${CX}px ${CY}px`,
                  transform: `rotate(${wheelRotDeg}deg)`,
                  transition: "transform 0.7s cubic-bezier(0.34,1.3,0.64,1)",
                }}
              >
                {renderedWedges.map((w) => {
                  const isHover = hoverKey === w.key;
                  const isSelected = selectedPid === w.key;
                  const hasPerson = !!w.person;
                  const color = genColor(w.generation);
                  const labelRot = labelRotation(w, wheelRotDeg);

                  return (
                    <g
                      key={w.key}
                      style={{
                        transformOrigin: `${CX}px ${CY}px`,
                        transform: isHover ? "scale(1.026)" : "scale(1)",
                        transition: "transform 0.25s ease",
                        cursor: "pointer",
                      }}
                      onMouseEnter={() => setHoverKey(w.key)}
                      onMouseLeave={() => setHoverKey(null)}
                      onClick={(e) => {
                        e.stopPropagation();
                        onWedgeClick(w.person?.id ?? null, w.isSibling);
                      }}
                      onDoubleClick={(e) => {
                        e.stopPropagation();
                        if (w.person) onWedgeDoubleClick(w.person.id);
                      }}
                    >
                      <path
                        data-person-id={w.person?.id ?? ""}
                        data-generation={w.generation}
                        data-sibling={w.isSibling ? "true" : "false"}
                        data-start-angle={w.startAngle}
                        data-end-angle={w.endAngle}
                        d={w.path}
                        fill={hasPerson ? color : "hsl(230,20%,18%)"}
                        fillOpacity={
                          hasPerson
                            ? isHover || isSelected
                              ? 0.95
                              : w.isSibling
                                ? 0.65
                                : 0.78
                            : 0.2
                        }
                        stroke={
                          isSelected ? "hsl(280,85%,65%)" : "hsl(230,30%,7%)"
                        }
                        strokeWidth={isSelected ? 3 : w.isSibling ? 1.5 : 2}
                        strokeDasharray={w.isSibling ? "6 3" : "none"}
                        style={{
                          filter:
                            isHover || isSelected
                              ? `drop-shadow(0 0 12px ${color})`
                              : "none",
                          transition: "all 0.2s ease",
                        }}
                      />
                      {hasPerson && (
                        <text
                          x={w.labelPos.x}
                          y={w.labelPos.y}
                          textAnchor="middle"
                          dominantBaseline="middle"
                          fontSize={
                            w.generation <= 1 ? 15 : w.generation <= 2 ? 12 : 10
                          }
                          fontWeight={w.isSibling ? 400 : 600}
                          fill={
                            w.isSibling ? "hsl(40,30%,80%)" : "hsl(40,30%,96%)"
                          }
                          transform={`rotate(${labelRot} ${w.labelPos.x} ${w.labelPos.y})`}
                          style={{
                            pointerEvents: "none",
                            fontFamily: "Inter,sans-serif",
                            textShadow: "0 1px 2px hsl(230 30% 7%/0.9)",
                          }}
                        >
                          <tspan x={w.labelPos.x} dy="-0.3em">
                            {w.person.name.split(" ")[0]}
                          </tspan>
                          <tspan
                            x={w.labelPos.x}
                            dy="1.1em"
                            fontSize={w.generation <= 2 ? 9 : 8}
                            fontWeight={400}
                            opacity={0.85}
                          >
                            {w.person.name.split(" ").slice(1).join(" ")}
                          </tspan>
                        </text>
                      )}
                    </g>
                  );
                })}
              </g>

              {spouses.slice(0, 6).map((spouse, i) => {
                const rightSide = i < 3;
                const shownCount = Math.min(spouses.length, 6);
                const rightCount = Math.min(shownCount, 3);
                const leftCount = Math.max(0, shownCount - 3);
                const sideIndex = rightSide ? i : i - 3;
                const sideCount = rightSide ? rightCount : leftCount;
                const offsets =
                  sideCount === 1
                    ? [0]
                    : sideCount === 2
                      ? [-0.18, 0.18]
                      : [-0.32, 0, 0.32];
                const baseMid = (rightSide ? 0 : Math.PI) + offsets[sideIndex];
                const visualMid = openSpouseAngle(baseMid + wheelRotRad);
                const spouseRotDeg = ((visualMid - baseMid) * 180) / Math.PI;
                const a0 = baseMid - 0.12;
                const a1 = baseMid + 0.12;
                const label = polar(CX, CY, CENTER_R + 70, baseMid);
                const initials = spouse.name
                  .split(" ")

                return (
                  <g

                    className="scaleIn"

                      transformOrigin: `${CX}px ${CY}px`,
                      transform: `rotate(${spouseRotDeg}deg)`,

                    onClick={(e) => {

                    onDoubleClick={(e) => {

                  >
                    <path

                        transition: "all 0.2s ease",
                      }}
                    />
                    <g
                      style={{
                        transformOrigin: `${label.x}px ${label.y}px`,
                        transform: `rotate(${-spouseRotDeg}deg)`,
                        transition:
                          "transform 0.7s cubic-bezier(0.34,1.3,0.64,1)",
                      }}
                    >
                      <text
                        x={label.x}
                        y={label.y - 5}
                        textAnchor="middle"
                        dominantBaseline="middle"
                        fontSize={12}
                        fontWeight={700}
                        fill="hsl(40,30%,96%)"
                        style={{
                          pointerEvents: "none",
                          fontFamily: "Inter,sans-serif",
                          textShadow: "0 1px 2px hsl(230 30% 7%/0.9)",

                      >
                        {initials}
                      </text>
                      <text

                        dominantBaseline="middle"

                        fontWeight={600}
                        fill="hsl(40,30%,96%)"

                        style={{
                          pointerEvents: "none",
                          fontFamily: "Inter,sans-serif",
                          textShadow: "0 1px 2px hsl(230 30% 7%/0.9)",
                        }}
                      >
                        Spouse
                      </text>
                    </g>
                  </g>
                );
              })}

              {/* Center */}
              <g
                style={{ cursor: "pointer" }}
                onClick={(e) => {
                  e.stopPropagation();
                  onCenterClick();
                }}
              >
                <circle
                  cx={CX}
                  cy={CY}
                  r={CENTER_R}
                  fill="url(#cg)"
                  className="pulse"
                />
                <circle
                  cx={CX}
                  cy={CY}
                  r={CENTER_R - 6}
                  fill="hsl(230,30%,7%)"

                />
                <g
                  style={{

                  }}
                >
                  <path
                    d={`M${CX - CENTER_R + 10} ${CY + 10} A${CENTER_R - 10} ${CENTER_R - 10} 0 0 0 ${CX + CENTER_R - 10} ${CY + 10} L${CX + CENTER_R - 28} ${CY + 10} A${CENTER_R - 28} ${CENTER_R - 28} 0 0 1 ${CX - CENTER_R + 28} ${CY + 10} Z`}
                    fill="hsl(230,30%,7%)"

                    stroke="hsl(230,30%,7%)"

                  />
                  <text

                <text

                  fontWeight={700}
                  fill="hsl(230,30%,7%)"

                  {initials}
                </text>
                <text
                  x={CX}

                  fontSize={11}

                  {center?.name ?? ""}
                </text>
              </g>
            </svg>

            {/* Line labels */}
            {isAncestorView ? (
              <>
                <div
                  style={{
                    position: "absolute",
                    top: 8,
                    left: 16,
                    display: "flex",
                    alignItems: "center",
                    gap: 6,
                    fontSize: 11,
                    fontWeight: 500,

                >
                  <span

            {/* Sibling hint */}
            {isAncestorView && sibAnchorPid && sibAnchorPid !== centerId && (

        );

      // ─── ADD PERSON MODAL ─────────────────────────────────────────────────────────
      function AddPersonModal({ context, family, onSubmit, onClose }) {
        const { personId, type } = context;
        const target = family[personId];
        const [form, setForm] = React.useState({
          name: "",
          gender:
            type === "father" || (type === "spouse" && target?.gender === "F")
              ? "M"
              : "F",
          birth: "",
          death: "",
          birthplace: "",
          occupation: "",
        });
        const set = (k) => (e) =>
          setForm((f) => ({ ...f, [k]: e.target.value }));

        const typeLabel =
          type === "sibling"
            ? "Sibling of"
            : type === "spouse"
              ? "Spouse of"
            : type === "child"
              ? "Child of"
            : type === "mother"
              ? "Mother of"
              : type === "father"
                ? "Father of"
                : "Parent of";

        function handleSubmit(e) {
          e.preventDefault();
          if (!form.name.trim()) return;
          const id = "p_" + Date.now();
          onSubmit(id, form, context);
          onClose();
        }

        const overlay = {
          position: "fixed",
          inset: 0,
          zIndex: 100,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          background: "hsl(230 30% 4%/0.7)",
          backdropFilter: "blur(6px)",
        };
        const modal = {
          background: "hsl(230,30%,9%)",
          border: "1px solid var(--border)",
          borderRadius: 20,
          padding: 28,
          width: 380,
          boxShadow: "0 32px 80px -8px hsl(0,0%,0%,0.7)",
        };
        const inp = {
          width: "100%",
          background: "hsl(230,25%,13%)",
          border: "1px solid var(--border)",
          borderRadius: 8,
          padding: "9px 12px",
          color: "var(--fg)",
          fontSize: 13,
          outline: "none",
        };
        const label = {
          fontSize: 12,
          fontWeight: 500,
          color: "var(--muted-fg)",
          marginBottom: 4,
          display: "block",
        };

        return (
          <div style={overlay} onClick={onClose}>
            <div
              style={modal}
              onClick={(e) => e.stopPropagation()}
              className="scaleIn"
            >
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "flex-start",
                  marginBottom: 20,
                }}
              >
                <div>
                  <h2 className="fd" style={{ fontSize: 20, lineHeight: 1 }}>
                    Add Family Member
                  </h2>
                  <p
                    style={{
                      fontSize: 12,
                      color: "var(--muted-fg)",
                      marginTop: 4,
                    }}
                  >
                    {typeLabel}{" "}
                    <span style={{ color: "var(--primary)" }}>
                      {target?.name}
                    </span>
                  </p>
                </div>
                <Btn variant="ghost" onClick={onClose}>
                  <IcX />
                </Btn>
              </div>

              <form onSubmit={handleSubmit}>
                <div
                  style={{ display: "flex", flexDirection: "column", gap: 14 }}
                >
                  <div>
                    <label style={label}>Full Name *</label>
                    <input
                      style={inp}
                      value={form.name}
                      onChange={set("name")}
                      placeholder="e.g. Margaret Smith"
                      required
                      autoFocus
                    />
                  </div>

                  <div>
                    <label style={label}>Gender</label>
                    <div style={{ display: "flex", gap: 8 }}>
                      {["F", "M"].map((g) => (
                        <label
                          key={g}
                          style={{
                            display: "flex",
                            alignItems: "center",
                            gap: 6,
                            cursor: "pointer",
                            fontSize: 13,
                            padding: "8px 14px",
                            borderRadius: 8,
                            border: `1px solid ${form.gender === g ? "var(--primary)" : "var(--border)"}`,
                            background:
                              form.gender === g
                                ? "hsl(280,85%,65%,0.12)"
                                : "transparent",
                            flex: 1,
                            justifyContent: "center",
                          }}
                        >
                          <input
                            type="radio"
                            name="gender"
                            value={g}
                            checked={form.gender === g}
                            onChange={set("gender")}
                            style={{ display: "none" }}
                          />
                          {g === "F" ? "♀ Female" : "♂ Male"}
                        </label>
                      ))}
                    </div>
                  </div>

                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "1fr 1fr",
                      gap: 10,
                    }}
                  >
                    <div>
                      <label style={label}>Birth Year</label>
                      <input
                        style={inp}
                        value={form.birth}
                        onChange={set("birth")}
                        placeholder="e.g. 1942"
                        maxLength={4}
                      />
                    </div>
                    <div>
                      <label style={label}>Death Year</label>
                      <input
                        style={inp}
                        value={form.death}
                        onChange={set("death")}
                        placeholder="if deceased"
                        maxLength={4}
                      />
                    </div>
                  </div>

                  <div>
                    <label style={label}>Birthplace</label>
                    <input
                      style={inp}
                      value={form.birthplace}
                      onChange={set("birthplace")}
                      placeholder="City, Country"
                    />
                  </div>

                  <div>
                    <label style={label}>Occupation</label>
                    <input
                      style={inp}
                      value={form.occupation}
                      onChange={set("occupation")}
                      placeholder="e.g. Farmer, Weaver…"
                    />
                  </div>

                  <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                    <Btn variant="outline" full onClick={onClose}>
                      Cancel
                    </Btn>
                    <Btn gradient full type="submit">
                      Add to Lineage
                    </Btn>
                  </div>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // ─── SHARED UI ATOMS ─────────────────────────────────────────────────────────
      function Btn({
        variant = "default",
        full,
        gradient,
        onClick,
        children,
        type = "button",
      }) {
        const base = {
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 6,
          border: "none",
          cursor: "pointer",
          fontFamily: "'Inter',sans-serif",
          fontWeight: 500,
          borderRadius: 8,
          transition: "all 0.15s",
          padding: "8px 14px",
          fontSize: 13,
          width: full ? "100%" : "auto",
        };
        const vars = {
          default: {
            ...base,
            background: "hsl(230,25%,16%)",
            color: "var(--fg)",
          },
          gradient: {
            ...base,
            background: "var(--grad-center)",
            color: "hsl(230,30%,7%)",
            fontWeight: 600,
          },
          outline: {
            ...base,
            background: "transparent",
            border: "1px solid var(--border)",
            color: "var(--fg)",
          },
          ghost: {
            ...base,
            background: "transparent",
            color: "var(--muted-fg)",
            padding: "6px",
          },
          "ghost-sm": {
            ...base,
            background: "transparent",
            color: "var(--muted-fg)",
            padding: "6px 10px",
            fontSize: 12,
          },
        };
        const s = gradient ? vars.gradient : vars[variant] || vars.default;
        return (
          <button style={s} onClick={onClick} type={type}>
            {children}
          </button>
        );
      }

      function Tag({ outline, children }) {
        return (
          <span
            style={{
              background: outline ? "transparent" : "hsl(230,25%,15%)",
              border: outline ? "1px solid var(--border)" : "none",
              borderRadius: 6,
              padding: "2px 8px",
              fontSize: 11,
              fontWeight: 500,
              display: "inline-block",
            }}
          >
            {children}
          </span>
        );
      }
      function Row({ label, value }) {
        return (
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              gap: 16,
              flexWrap: "wrap",
            }}
          >
            <span style={{ color: "var(--muted-fg)" }}>{label}</span>
            <span
              style={{
                fontWeight: 500,
                textAlign: "right",
                wordBreak: "break-word",
              }}
            >
              {value}
            </span>
          </div>
        );
      }

      // ─── INFO PANEL ───────────────────────────────────────────────────────────────
      function InfoPanel() {
        return (
          <div
            className="glass"
            style={{
              border: "1px solid var(--border)",
              borderRadius: 16,
              padding: 24,
              boxShadow: "var(--shadow)",
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "flex-start",
                gap: 12,
                marginBottom: 12,
              }}
            >
              <div
                style={{
                  width: 36,
                  height: 36,
                  borderRadius: 10,
                  background: "hsl(280 85% 65%/0.15)",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  color: "var(--primary)",
                  flexShrink: 0,
                }}
              >
                <IcInfo />
              </div>
              <div>
                <h3 className="fd" style={{ fontSize: 18, lineHeight: 1.2 }}>
                  Explore the wheel
                </h3>
                <p style={{ fontSize: 12, color: "var(--muted-fg)" }}>
                  A few ways to navigate
                </p>
              </div>
            </div>
            <ul
              style={{
                fontSize: 13,
                display: "flex",
                flexDirection: "column",
                gap: 10,
                color: "var(--muted-fg)",
                listStyle: "none",
              }}
            >
              {[
                [
                  "→",
                  "Click any wedge to select and reveal siblings in the same ring",
                ],
                ["→", "Double-click to make that ancestor the new center"],
                [
                  "→",
                  "Dashed-border wedges are siblings (not direct ancestors)",
                ],
                ["→", "Use the person card to add parents or siblings"],
                ["→", "Wheel stays in fan mode with a 180° sweep"],
              ].map(([a, b], i) => (
                <li key={i} style={{ display: "flex", gap: 8 }}>
                  <span style={{ color: "var(--primary)", flexShrink: 0 }}>
                    {a}
                  </span>
                  {b}
                </li>
              ))}
            </ul>
          </div>
        );
      }

      // ─── APP ──────────────────────────────────────────────────────────────────────
      function App({ initialFamily, rootId }) {
        const saved = React.useMemo(() => {
          try {
            return JSON.parse(localStorage.getItem("lineage-v2") || "{}");
          } catch {
            return {};
          }
        }, []);

        const [family, setFamily] = React.useState(() => ({
          ...initialFamily,
        }));
        const [centerId, setCenterId] = React.useState(
          saved.centerId ?? rootId,
        );
        const [expanded, setExpanded] = React.useState(
          () => new Set(saved.expanded ?? []),
        );
        const [selectedPid, setSelectedPid] = React.useState(null); // drives person card
        const [sibAnchorPid, setSibAnchorPid] = React.useState(null); // drives sibling fan in wheel
        const [viewDirection, setViewDirection] = React.useState("ancestors");
        const [centerHistory, setCenterHistory] = React.useState([]);
        const [addCtx, setAddCtx] = React.useState(null);

        React.useEffect(() => {
          localStorage.setItem(
            "lineage-v2",
            JSON.stringify({ centerId, expanded: [...expanded] }),
          );
        }, [centerId, expanded]);

        const center = family[centerId];
        const selectedPerson = selectedPid ? family[selectedPid] : null;

        function lineageExpansionFor(personId) {
          const path = [];
          function walk(pid) {
            if (!pid) return false;
            if (pid === personId) {
              path.push(pid);
              return true;
            }
            const p = family[pid];
            if (!p) return false;
            if (walk(p.motherId) || walk(p.fatherId)) {
              if (pid !== centerId) path.push(pid);
              return true;
            }
            return false;
          }
          walk(centerId);
          return new Set(path);
        }

        function descendantExpansionFor(personId) {
          const path = [];
          function walk(pid) {
            if (!pid) return false;
            if (pid === personId) {
              path.push(pid);
              return true;
            }
            for (const child of getChildren(pid, family)) {
              if (walk(child.id)) {
                if (pid !== centerId) path.push(pid);
                return true;
              }
            }
            return false;
          }
          walk(centerId);
          return new Set(path);
        }

        React.useEffect(() => {
          if (!selectedPid && !sibAnchorPid && expanded.size > 0) {
            setExpanded(new Set());
          }
        }, []);

        function handleWedgeClick(personId, isSibling) {
          if (!personId) return;
          if (viewDirection === "descendants") {
            setSelectedPid(personId);
            setSibAnchorPid(null);
            setExpanded(descendantExpansionFor(personId));
            return;
          }
          if (isSibling) {
            setSelectedPid((prev) =>
              prev === personId ? sibAnchorPid : personId,
            );
          } else {
            if (sibAnchorPid === personId) {
              if (selectedPid === personId) {
                setExpanded(lineageExpansionFor(personId));
              } else {
                // Sibling was dominant — re-click anchor rotates it back to center, fan stays open
                setSelectedPid(personId);
                setExpanded(lineageExpansionFor(personId));
              }
            } else {
              setSelectedPid(personId);
              setSibAnchorPid(personId);
              setExpanded(lineageExpansionFor(personId));
            }
          }
        }

        function handleRecenter(id) {
          if (id !== centerId) {
            setCenterHistory((prev) => [...prev, centerId]);
          }
          setCenterId(id);
          setExpanded(new Set());
          setSelectedPid(null);
          setSibAnchorPid(null);
        }

        function handleHistoryBack() {
          if (centerHistory.length === 0) return;
          const previousCenterId = centerHistory[centerHistory.length - 1];
          setCenterHistory((prev) => prev.slice(0, -1));
          setCenterId(previousCenterId);
          setExpanded(new Set());
          setSelectedPid(null);
          setSibAnchorPid(null);
        }

        function handleToggleDirection() {
          setViewDirection((prev) =>
            prev === "ancestors" ? "descendants" : "ancestors",
          );
          setExpanded(new Set());
          setSelectedPid(null);
          setSibAnchorPid(null);
        }

        function handleSpouseClick(id) {
          setSelectedPid(id);
          setSibAnchorPid(null);
          setExpanded(new Set());
        }

        function handleReset() {
          setCenterId(rootId);
          setExpanded(new Set());
          setSelectedPid(null);
          setSibAnchorPid(null);
          setViewDirection("ancestors");
          setCenterHistory([]);
          setFamily({ ...initialFamily });
        }

        function handleAddPerson(newId, formData, ctx) {
          const { personId, type } = ctx;
          const target = family[personId];

          const newPerson = {
            id: newId,
            name: formData.name.trim(),
            gender: formData.gender,
            ...(formData.birth && { birth: formData.birth }),
            ...(formData.death && { death: formData.death }),
            ...(formData.birthplace && { birthplace: formData.birthplace }),
            ...(formData.occupation && { occupation: formData.occupation }),
          };

          setFamily((prev) => {
            const next = { ...prev };

            if (type === "sibling") {
              newPerson.motherId = target?.motherId;
              newPerson.fatherId = target?.fatherId;
              next[newId] = newPerson;
            } else if (type === "spouse") {
              newPerson.spouseIds = [personId];
              next[newId] = newPerson;
              const existing = new Set(next[personId]?.spouseIds || []);
              if (next[personId]?.spouseId) existing.add(next[personId].spouseId);
              existing.add(newId);
              next[personId] = {
                ...next[personId],
                spouseIds: [...existing],
                spouseId: undefined,
              };
            } else if (type === "child") {
              if (target?.gender === "M") newPerson.fatherId = personId;
              else newPerson.motherId = personId;
              next[newId] = newPerson;
            } else if (
              type === "mother" ||
              (type === "parent" && formData.gender === "F")
            ) {
              newPerson.gender = "F";
              next[newId] = newPerson;
              next[personId] = { ...next[personId], motherId: newId };
            } else if (
              type === "father" ||
              (type === "parent" && formData.gender === "M")
            ) {
              newPerson.gender = "M";
              next[newId] = newPerson;
              next[personId] = { ...next[personId], fatherId: newId };
            } else {
              // generic parent — use gender to determine
              next[newId] = newPerson;
              if (formData.gender === "F")
                next[personId] = { ...next[personId], motherId: newId };
              else next[personId] = { ...next[personId], fatherId: newId };
            }
            return next;
          });

          if (type === "child") {
            setExpanded((prev) => {
              const next = new Set(prev);
              next.add(personId);
              return next;
            });
          }
        }

        const stats = React.useMemo(
          () => ({
            total: Object.keys(family).length,
            expanded: expanded.size,
          }),
          [family, expanded],
        );

        return (
          <div style={{ minHeight: "100vh" }}>
            {/* Header */}
            <header
              className="glass"
              style={{
                borderBottom: "1px solid hsl(230,25%,20%,0.4)",
                position: "sticky",
                top: 0,
                zIndex: 30,
              }}
            >
              <div
                style={{
                  maxWidth: 1400,
                  margin: "0 auto",
                  padding: "14px 32px",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div
                    style={{
                      width: 40,
                      height: 40,
                      borderRadius: 12,
                      background: "var(--grad-center)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      color: "hsl(230,30%,7%)",
                    }}
                  >
                    <IcTree />
                  </div>
                  <div>
                    <h1 className="fd" style={{ fontSize: 20, lineHeight: 1 }}>
                      Rootline
                    </h1>
                    <p style={{ fontSize: 11, color: "var(--muted-fg)" }}>
                      Interactive lineage atlas
                    </p>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: "var(--muted-fg)" }}>
                    {stats.total} people
                  </span>
                  <Btn onClick={handleReset}>
                    <IcReset /> Reset
                  </Btn>
                </div>
              </div>
            </header>

            {/* Main */}
            <div
              style={{
                maxWidth: 1400,
                margin: "0 auto",
                padding: "28px 32px",
                display: "grid",
                gridTemplateColumns: "1fr 360px",
                gap: 32,
                alignItems: "start",
              }}
            >
              <section
                style={{ display: "flex", flexDirection: "column", gap: 16 }}
              >
                <div
                  className="fadeUp"
                  style={{
                    textAlign: "center",
                    maxWidth: 600,
                    margin: "0 auto",
                  }}
                >
                  <h2
                    className="fd glow"
                    style={{ fontSize: 34, marginBottom: 8 }}
                  >
                    {viewDirection === "ancestors"
                      ? "The Lineage of "
                      : "Descendants of "}
                    <span style={{ color: "var(--primary)" }}>
                      {center?.name}
                    </span>
                  </h2>
                  <p style={{ fontSize: 13, color: "var(--muted-fg)" }}>
                    {viewDirection === "ancestors"
                      ? "Click any wedge to select and reveal siblings · Double-click to recenter"
                      : "Click any wedge to follow descendants · Double-click to recenter"}
                  </p>
                </div>

                <div
                  className="glass"
                  style={{
                    borderRadius: 24,
                    border: "1px solid hsl(230,25%,20%,0.6)",
                    padding: 24,
                    boxShadow: "var(--shadow)",
                  }}
                >
                  <LineageWheel
                    centerId={centerId}
                    family={family}
                    expanded={expanded}
                    selectedPid={selectedPid}
                    sibAnchorPid={sibAnchorPid}
                    viewDirection={viewDirection}
                    canGoBack={centerHistory.length > 0}
                    onWedgeClick={handleWedgeClick}
                    onWedgeDoubleClick={handleRecenter}
                    onCenterClick={() => {
                      setSelectedPid(centerId);
                      setSibAnchorPid(null);
                    }}
                    onHistoryBack={handleHistoryBack}
                    onSpouseClick={handleSpouseClick}
                  />
                </div>

                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 20,
                    fontSize: 12,
                    color: "var(--muted-fg)",
                  }}
                >
                  <span>{stats.total} people in archive</span>
                  <span>•</span>
                  <span>{stats.expanded} branches expanded</span>
                </div>
              </section>

              {/* Sidebar */}
              <aside
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: 14,
                  position: "sticky",
                  top: 96,
                  marginTop: 82,
                }}
              >
                {selectedPerson || selectedPid === centerId ? (
                  <PersonCard
                    person={selectedPid === centerId ? center : selectedPerson}
                    isCenter={selectedPid === centerId}
                    family={family}
                    viewDirection={viewDirection}
                    onRecenter={handleRecenter}
                    onClose={() => {
                      setSelectedPid(null);
                      setSibAnchorPid(null);
                    }}
                    onAddPerson={(pid, type) =>
                      setAddCtx({ personId: pid, type })
                    }
                  />
                ) : (
                  <InfoPanel />
                )}
                <Btn full gradient onClick={handleToggleDirection}>
                  {viewDirection === "ancestors"
                    ? "Show descendants"
                    : "Show ancestors"}
                </Btn>
                <Legend viewDirection={viewDirection} />
              </aside>
            </div>

            <footer
              style={{
                maxWidth: 1400,
                margin: "0 auto",
                padding: "32px 32px",
                textAlign: "center",
                fontSize: 12,
                color: "var(--muted-fg)",
              }}
            >
              Rootline · Sample lineage of the Hartwell-Vasquez family
            </footer>

            {addCtx && (
              <AddPersonModal
                context={addCtx}
                family={family}
                onSubmit={handleAddPerson}
                onClose={() => setAddCtx(null)}
              />
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));

      root.render(
        <div
          style={{
            minHeight: "100vh",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            color: "var(--muted-fg)",
            fontFamily: "Inter,sans-serif",
          }}
        >
          Loading family archive...
        </div>,
      );

      loadFamilyData()
        .then(({ family, rootId }) => {
          root.render(<App initialFamily={family} rootId={rootId} />);
        })
        .catch((error) => {
          console.error(error);
          root.render(
            <div
              style={{
                minHeight: "100vh",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                color: "var(--muted-fg)",
                fontFamily: "Inter,sans-serif",
                padding: 32,
                textAlign: "center",
              }}
            >
              Could not load the family archive.
            </div>,
          );
        });
    </script>
  </body>
</html>
